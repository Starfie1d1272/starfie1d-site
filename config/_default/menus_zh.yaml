# 导航链接
# 要链接主页小部件，请将 URL 指定为井号 `#`，后跟所需小部件的名称。
# weight 参数定义链接出现的顺序。

main:
  - name: 关于我
    url: "#about" # 对应顶部简介块
    weight: 10
  - name: 科研经历
    url: "#experience" # 对应科研时间轴
    weight: 20
  - name: 技能工具
    url: "#skills" # 对应你的 Python/仪器等技能条
    weight: 30
  - name: 荣誉与视觉
    url: "#photography" # 👈 指向你刚刚在 _index.md 里定义的 id: photography
    weight: 40
