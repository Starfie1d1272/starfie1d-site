# Navigation Links
# To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
# desired widget in your `content/home/` folder.
# The weight parameter defines the order that the links will appear in.

main:
  - name: About
    url: "/#about" # Corresponds to the top intro block
    weight: 10
  - name: Experience
    url: "/#experience" # Corresponds to the research timeline
    weight: 20
  - name: Skills
    url: "/#skills" # Corresponds to your Python/Instrument skills bar
    weight: 30
  - name: Awards & Gallery
    url: "#photography" # Points to the id: photography defined in _index.md
    weight: 40
