# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX 核心配置
# 架构版本: 2.0
# 官方文档: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # 身份标识 (IDENTITY)
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    # 网站名称 - 默认显示在导航栏、页脚和浏览器标题
    name: "Xinyu Du"
    # 所属机构
    organization: "Nanjing University"
    # Schema.org 类型 (保持为 person)
    type: person
    # 英文标语
    tagline: "Planetary Science @ NJU | Planetary Chemistry & Astrobiology"
    # 英文 SEO 描述
    description: "Academic homepage of Xinyu Du at Nanjing University. Research interests: Planetary Science, Geochemistry, and Astrobiology."
    social:
      twitter: "starfie1d1272"

  # ────────────────────────────────────────────────────────────────────────────
  # 视觉主题 (THEME)
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    # 模式选择: 'light' (浅色), 'dark' (深色), 或 'system' (随系统)
    mode: system
    # 主题包名: 见 data/themes/ 目录
    pack: "default"
    # 颜色配置: 可选 "indigo", "slate", "blue", "green" 等
    colors:
      primary: "indigo"
      secondary: ""
      neutral: "slate"

  # ────────────────────────────────────────────────────────────────────────────
  # 字体排版 (TYPOGRAPHY)
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    # 字体选择: 'sans' (Inter), 'serif' (Roboto Slab), 或 'native' (系统默认字体)
    font: "native"
    # 字号大小: 'sm', 'md', 'lg', 或 'xl'
    size: "md"

  # ────────────────────────────────────────────────────────────────────────────
  # 布局方案 (LAYOUT)
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    # 圆角弧度: 'none', 'sm', 'md', 'lg', 或 'full'
    radius: "lg"
    # 间距密度: 'compact' (紧凑), 'comfortable' (舒适), 或 'spacious' (宽松)
    spacing: "comfortable"
    # 头像形状: circle (圆) | square (方) | rounded (圆角方)
    avatar_shape: circle

  # ────────────────────────────────────────────────────────────────────────────
  # 导航栏 (HEADER)
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    # 样式: navbar (标准), navbar-simple (简洁), minimal (极简)
    style: navbar
    sticky: true
    # 对齐方式: left, center, right
    align: right
    search: true
    theme_toggle: true
    # 【修改】开启语言切换器
    language_switcher: true

  # ────────────────────────────────────────────────────────────────────────────
  # 页脚 (FOOTER)
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal
    # 【修改】开启页脚语言切换
    language_switcher: true
    # 英文页脚文本
    text: "School of Earth Sciences and Engineering, Nanjing University"

  # ────────────────────────────────────────────────────────────────────────────
  # 版权信息 (COPYRIGHT)
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    notice: "© {year} {name}. Powered by Hugo Blox."
    license:
      type: cc # cc (知识共享) | custom (自定义)
      allow_derivatives: true
      share_alike: true
      allow_commercial: false

  # ────────────────────────────────────────────────────────────────────────────
  # SEO 与 AI 配置
  # ────────────────────────────────────────────────────────────────────────────
  seo:
    title: "Xinyu Du | Planetary Science @ NJU"
    location:
      address:
        city: "Nanjing"
        region: "Jiangsu"
        postal_code: "210023"
        street: "163 Xianlin Avenue"
        country: "China"
    # AI 抓取声明 (保留你的原始核心内容)
    ai:
      allow:
        - /
      disallow: []
      note: "This is the official personal and academic website of Xinyu Du, researcher in Planetary Science at Nanjing University. AI crawlers are permitted for search and summary purposes. Please ensure proper attribution to 'Xinyu Du' and provide direct source links."
      contact: "duxinyu475@gmail.com"

  # ────────────────────────────────────────────────────────────────────────────
  # 内容渲染与功能 (CONTENT & SEARCH)
  # ────────────────────────────────────────────────────────────────────────────
  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: false
    # 文献引用样式: apa, mla, chicago, ieee
    citations:
      style: ieee

  search:
    enable: true
    suggestions:
      - Planetary Chemistry
      - Astro Photography
      - Nanjing University

  verification:
    google: "1_PrbWZ0EzIpjPiVx1FJ0IqoMobsfyuMk1Dgix9IsFU"

  locale:
    date_format: "2006-01-02"
    time_format: "15:04"
    address_format: en-us
