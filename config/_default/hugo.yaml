# yaml-language-server: $schema=http://json-schema.org/draft-07/schema#
# Configuration of Hugo
# Guide: https://docs.hugoblox.com/tutorial/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Website name (set in params.yaml under hugoblox.branding.name)
title: "杜鑫宇 | Xinyu Du"
# Website URL
baseURL: "https://starfie1d.top/"

############################
## 1. 语言与 CJK 深度优化
############################

defaultContentLanguage: zh-Hans
hasCJKLanguage: true # 开启中日韩语支持
summaryLength: 70 # 中文摘要建议从 30 增加到 70（中文分词比英文短）
removePathAccents: true # 移除路径中的重音符号
defaultContentLanguageInSubdir: false

############################
## 2. 图像处理 (针对 2.5s LCP 的降维打击)
############################
imaging:
  resampleFilter: "Lanczos"
  quality: 85
  anchor: "Smart"
  hint: picture
  format: webp # 🔥 核心：强制所有处理后的图片输出为 WebP 格式
  exif:
    disable: true # 移除图片位置/拍摄器材信息（保护隐私并减小体积）

############################
## 3. 构建与性能优化 (Minify)
############################
minify:
  disableXML: false
  minifyOutput: true # 强制开启 HTML 压缩

build:
  writeStats: true

enableGitInfo: false
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [".ipynb_checkpoints$", "\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
disableAliases: true
outputs:
  home: [HTML, RSS, headers, redirects, backlinks]
  section: [HTML, RSS]

# 禁用冗余元数据
disableHugoGeneratorInject: true # 移除 HTML 源代码里的 "Hugo 0.158" 标记

############################
## 4. 渲染与安全 (Markup)
############################
markup:
  _merge: deep
  goldmark:
    renderer:
      unsafe: true # 允许在 Markdown 里写 HTML（方便以后做复杂的行星化学图表）
    parser:
      attribute:
        block: true
        title: true
  highlight:
    lineNos: false
    style: dracula # 代码高亮主题，极客风

############################
## 5. 高级路径与分类
############################
taxonomies:
  author: authors
  tag: tags
  publication_type: publication_types

# 针对 slides 和项目的特殊输出设置
cascade:
  - _target:
      path: /slides/**
      kind: page
    outputs: [HTML, present]

############################
## 6. 其他设置
############################
timeout: "600s"
security:
  _merge: deep
sitemap:
  changefreq: weekly
  priority: 0.5
  filename: sitemap.xml
  _merge: deep

# 如果不需要标签/分类页，可以减重：taxonomy 和 taxonomyTerm 会被禁用
# disableKinds: ["taxonomy", "taxonomyTerm"]

# 分页预设
pagination:
  pagerSize: 10
