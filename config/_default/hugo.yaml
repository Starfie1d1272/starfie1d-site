# yaml-language-server: $schema=http://json-schema.org/draft-07/schema#
# ══════════════════════════════════════════════════════════════════════════════
# HUGO 站点总配置
# ══════════════════════════════════════════════════════════════════════════════

# 网站默认标题 (会被 languages.yaml 中的配置覆盖)
title: "Xinyu Du | Starfie1d"
# 网站部署地址
baseURL: "https://starfie1d.top/"

# ────────────────────────────────────────────────────────────────────────────
# 1. 多语言与中文字符优化 (Multilingual & CJK)
# ────────────────────────────────────────────────────────────────────────────

# 【重要修改】默认语言改为英文 (配合 Phase 1)
defaultContentLanguage: en
# 开启中日韩语支持 (确保中文分词和搜索正常)
hasCJKLanguage: true
# 摘要长度 (针对中文环境设为 70)
summaryLength: 70
# 默认语言是否显示在子目录 (false 表示英文在 /，中文在 /zh/)
defaultContentLanguageInSubdir: false
# 移除路径中的重音符号
removePathAccents: true

# ────────────────────────────────────────────────────────────────────────────
# 2. 图像处理优化 (Imaging & Performance)
# ────────────────────────────────────────────────────────────────────────────
imaging:
  resampleFilter: "Lanczos"
  quality: 85
  anchor: "Smart"
  # 强制所有处理后的图片输出为 WebP 格式，极大提升加载速度
  format: webp
  exif:
    disable: true # 移除拍摄器材/位置等隐私信息

# ────────────────────────────────────────────────────────────────────────────
# 3. 渲染与代码高亮 (Markup & Highlighting)
# ────────────────────────────────────────────────────────────────────────────
markup:
  _merge: deep
  goldmark:
    renderer:
      # 允许在 Markdown 中使用 HTML (方便插入行星科学图表或自定义组件)
      unsafe: true
  highlight:
    lineNos: false
    # 代码高亮风格: dracula
    style: dracula

# ────────────────────────────────────────────────────────────────────────────
# 4. 构建优化 (Minify & Build)
# ────────────────────────────────────────────────────────────────────────────
minify:
  disableXML: false
  # 开启 HTML/CSS/JS 压缩，减小网页体积
  minifyOutput: true

build:
  writeStats: true

# ────────────────────────────────────────────────────────────────────────────
# 5. 系统路径与分类 (Taxonomies)
# ────────────────────────────────────────────────────────────────────────────
taxonomies:
  author: authors
  tag: tags
  publication_type: publication_types

# 针对幻灯片 (Slides) 的特殊输出配置
cascade:
  - _target:
      path: /slides/**
      kind: page
    outputs: [HTML, present]

# ────────────────────────────────────────────────────────────────────────────
# 6. 其他基础设置
# ────────────────────────────────────────────────────────────────────────────
timeout: "600s" # 构建超时限制 (适用于多图站点)
enableEmoji: true
enableRobotsTXT: true
disableHugoGeneratorInject: true # 移除源代码中的 Hugo 版本标记
disableAliases: true

# 首页输出格式
outputs:
  home: [HTML, RSS, headers, redirects, backlinks]
